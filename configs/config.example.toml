[logger]
level = "info"

[database]
# dialect selects the engine: "sqlite", "postgres", or "mysql".
# url is the engine-specific DSN.
dialect = "sqlite"
url = "koochooloo.db"

# postgres example:
# dialect = "postgres"
# url = "host=127.0.0.1 user=koochooloo password=secret dbname=koochooloo port=5432 sslmode=disable"

# mysql example:
# dialect = "mysql"
# url = "koochooloo:secret@tcp(127.0.0.1:3306)/koochooloo?charset=utf8mb4&parseTime=True&loc=Local"

[auth]
# HMAC secret used to sign admin session tokens. CHANGE THIS in production.
jwt_secret = "koochooloo-development-secret-change-me"
# token lifetime as a Go duration string
token_ttl = "24h"

# optional OpenID Connect login (e.g. Keycloak). Local password login always works.
[auth.oidc]
enabled = false
issuer = "https://keycloak.example.com/realms/koochooloo"
client_id = "koochooloo"
client_secret = ""
redirect_url = "http://127.0.0.1:1378/admin/api/auth/oidc/callback"
scopes = ["openid", "profile", "email"]
# claim inspected for roles; dotted paths supported (Keycloak: "realm_access.roles")
roles_claim = "groups"
admin_values = ["koochooloo-admin"]
superadmin_values = ["koochooloo-superadmin"]

[telemetry]
namespace = "1995parham"
service_name = "koochooloo"

[telemetry.meter]
address = ":8080"
enabled = true

[telemetry.trace]
enabled = true

[telemetry.trace.agent]
host = "127.0.0.1"
port = "6831"
